name: Build and Deploy 

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-vanilla-app .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-vanilla-app

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_HOST}}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull faizjs/my-vanilla-app
            docker stop my-vanilla-app
            docker rm my-vanilla-app
            docker run -d -p 80:80 --name my-vanilla-app faizjs/my-vanilla-app